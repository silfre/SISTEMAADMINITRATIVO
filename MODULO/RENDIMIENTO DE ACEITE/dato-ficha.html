<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dato Ficha</title>
    <link rel="stylesheet" href="aceite.css">
</head>
<body>

<div class="app">

    <aside class="sidebar" id="sidebar">
        <button class="btn-menu" onclick="alternarMenu()">☰</button>

        <div class="logo">
            <div class="logo-icono">K</div>
            <div class="logo-texto">KashlySys</div>
        </div>

        <button class="menu-item" onclick="irInicio()">
            <span class="menu-icono">🏠</span>
            <span class="menu-texto">Inicio</span>
        </button>

        <button class="menu-item" onclick="irRendimientoAceite()">
            <span class="menu-icono">🛢️</span>
            <span class="menu-texto">Rendimiento</span>
        </button>

        <button class="menu-item" onclick="irCompraTanque()">
            <span class="menu-icono">📦</span>
            <span class="menu-texto">Compra Tanque</span>
        </button>

        <button class="menu-item activo" onclick="irDatoFicha()">
            <span class="menu-icono">🚌</span>
            <span class="menu-texto">Dato Ficha</span>
        </button>

        <button class="menu-item" onclick="irReporteTanque()">
            <span class="menu-icono">📋</span>
            <span class="menu-texto">Reporte Tanque</span>
        </button>
    </aside>

    <main class="contenido" id="contenido">

        <section class="encabezado">
            <div>
                <h1>Dato Ficha</h1>
                <p>Base de datos de fichas, categorías y tipo de unidad.</p>
            </div>
        </section>

        <section class="panel">
            <h2>Registrar ficha</h2>

            <div class="form-grid">
                <div class="campo">
                    <label>Ficha</label>
                    <input type="text" placeholder="Ej: T89">
                </div>

                <div class="campo">
                    <label>Categoría</label>
                    <select>
                        <option>VAN</option>
                        <option>VAN15</option>
                        <option>BUS20</option>
                        <option>BUS26</option>
                        <option>BUS31</option>
                        <option>Servicio Platinum</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Tipo de unidad</label>
                    <select>
                        <option>HIACE CAJA VIEJA</option>
                        <option>HIACE CAJA NUEVA</option>
                        <option>COASTER</option>
                        <option>MITSUBISHI</option>
                        <option>MERCEDES BENZ</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Estado</label>
                    <select>
                        <option>ACTIVO</option>
                        <option>INACTIVO</option>
                    </select>
                </div>
            </div>

            <div class="botones">
                <button class="btn btn-verde" onclick="guardarBase()">Guardar ficha</button>
                <button class="btn btn-rojo" onclick="limpiarFormulario()">Limpiar</button>
            </div>
        </section>

        <section class="panel">
            <h2>Listado de fichas</h2>

            <div class="tabla-contenedor">
                <table>
                    <thead>
                    <tr>
                        <th>Ficha</th>
                        <th>Categoría</th>
                        <th>Tipo de unidad</th>
                        <th>Estado</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td>T89</td>
                        <td>VAN</td>
                        <td>HIACE CAJA VIEJA</td>
                        <td>ACTIVO</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

</div>

<script src="aceite.js"></script>
</body>
</html>
